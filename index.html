<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spellingcheck!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #4caf7d;
      --green-light: #e8f7ef;
      --red: #e05454;
      --red-light: #fdeaea;
      --blue: #4a90d9;
      --yellow: #f9c846;
      --bg: #fdf8f2;
      --card: #ffffff;
      --text: #2c2c2c;
      --muted: #888;
      --radius: 18px;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
      color: var(--text);
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo {
      font-size: 3rem;
      margin-bottom: 0.25rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    h1 span { color: var(--green); }

    .tagline {
      font-size: 1rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 0.5rem;
    }

    input[type="text"] {
      flex: 1;
      font-family: 'Nunito', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
      padding: 0.75rem 1rem;
      border: 2.5px solid #e8e0d8;
      border-radius: 12px;
      outline: none;
      background: #fafafa;
      color: var(--text);
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--blue);
      background: #fff;
    }

    input[type="text"].shake {
      animation: shake 0.3s ease;
      border-color: var(--red);
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .hint {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1.25rem;
      padding-left: 4px;
    }

    button#check-btn {
      font-family: 'Nunito', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 0.75rem 1.25rem;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
      white-space: nowrap;
    }

    button#check-btn:hover { background: #3a9e6c; }
    button#check-btn:active { transform: scale(0.96); }
    button#check-btn:disabled { background: #bbb; cursor: not-allowed; }

    #result { min-height: 20px; }

    .feedback {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 1rem 1.25rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      animation: popIn 0.25s ease;
    }

    @keyframes popIn {
      from { transform: scale(0.95); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .feedback.ok  { background: var(--green-light); color: #2a7a50; }
    .feedback.err { background: var(--red-light);   color: #b03030; }
    .feedback.loading { background: #f0f0f0; color: var(--muted); }

    .feedback .icon { font-size: 1.5rem; flex-shrink: 0; }

    .suggestion-btn {
      display: inline-block;
      margin-top: 8px;
      background: white;
      border: 2px solid var(--green);
      color: var(--green);
      border-radius: 8px;
      padding: 4px 14px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      transition: background 0.15s;
    }
    .suggestion-btn:hover { background: var(--green-light); }

    .img-wrap {
      border-radius: 12px;
      overflow: hidden;
      background: #f0ece6;
      animation: popIn 0.3s ease;
    }

    .img-wrap img {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      display: block;
    }

    .img-label {
      padding: 0.6rem 1rem;
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
    }

    .stars {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 0.75rem;
      letter-spacing: 4px;
      animation: popIn 0.3s ease;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #bbb;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">✏️</div>
  <h1>Spelling<span>Check!</span></h1>
  <p class="tagline">Typ een woord en kijk of het goed is</p>
</header>

<div class="card">
  <div class="input-group">
    <input type="text" id="word-input" placeholder="Schrijf een woord..." autocomplete="off" />
    <button id="check-btn">Controleer ✓</button>
  </div>
  <p class="hint">Voer 1 woord in</p>
  <div id="result"></div>
</div>

<footer>Gemaakt met ❤️ voor leerlingen</footer>

<script>
  const input = document.getElementById('word-input');
  const btn   = document.getElementById('check-btn');
  const result = document.getElementById('result');

  // Blokkeer spaties in het invoerveld
  input.addEventListener('keydown', e => {
    if (e.key === ' ') {
      e.preventDefault();
      input.classList.add('shake');
      setTimeout(() => input.classList.remove('shake'), 400);
      return;
    }
    if (e.key === 'Enter') check();
  });

  // Verwijder spaties bij plakken
  input.addEventListener('input', () => {
    const pos = input.selectionStart;
    const cleaned = input.value.replace(/\s/g, '');
    if (cleaned !== input.value) {
      input.value = cleaned;
      input.setSelectionRange(pos, pos);
    }
  });

  btn.addEventListener('click', check);

  async function check() {
    const word = input.value.trim();
    if (!word) return;

    btn.disabled = true;
    result.innerHTML = `<div class="feedback loading"><span class="icon">⏳</span> Even controleren...</div>`;

    try {
      const resp = await fetch('/api/check', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ word })
      });

      const data = await resp.json();

      if (resp.status === 429) {
        const reset = data.resetTime || 'morgen om 09:00';
        result.innerHTML = `<div class="feedback err"><span class="icon">⏳</span> De AI is even vol. Je kunt weer verder op <strong>${reset}</strong>.</div>`;
        return;
      }

      if (!resp.ok) throw new Error('Server fout');

      if (data.correct) {
        await showOk(data.correctWord || word, data.imageQuery);
      } else {
        showError(word, data.correctWord, data.uitleg);
      }
    } catch(e) {
      result.innerHTML = `<div class="feedback err"><span class="icon">⚠️</span> Er ging iets mis. Probeer opnieuw!</div>`;
    } finally {
      btn.disabled = false;
    }
  }

  async function showOk(word, imageQuery) {
    result.innerHTML = `
      <div class="stars">⭐⭐⭐</div>
      <div class="feedback ok">
        <span class="icon">✅</span>
        <span><strong>${word}</strong> is goed gespeld! Knap hoor!</span>
      </div>
      <div id="img-area"></div>`;

    try {
      // Gebruik het correcte woord zelf als zoekterm, niet de AI-suggestie
      const imgResp = await fetch(`/api/image?q=${encodeURIComponent(imageQuery)}&exact=${encodeURIComponent(word)}`);
      const imgData = await imgResp.json();
      if (imgData.url) {
        document.getElementById('img-area').innerHTML = `
          <div class="img-wrap">
            <img src="${imgData.url}" alt="${word}" />
            <div class="img-label">Een plaatje van: <strong>${word}</strong></div>
          </div>`;
      }
    } catch(e) { /* plaatje ophalen mislukt */ }
  }

  function showError(raw, correct, uitleg) {
    result.innerHTML = `
      <div class="feedback err">
        <span class="icon">❌</span>
        <div>
          <div><strong>${raw}</strong> — ${uitleg || 'dat klopt nog niet helemaal!'}</div>
          ${correct ? `<button class="suggestion-btn" id="sug-btn">👉 Bedoel je: <strong>${correct}</strong>?</button>` : ''}
        </div>
      </div>`;
    const sugBtn = document.getElementById('sug-btn');
    if (sugBtn) {
      sugBtn.addEventListener('click', () => {
        input.value = correct.replace(/\s/g, '');
        check();
      });
    }
  }
</script>
</body>
</html>
